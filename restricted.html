<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MUHIUM & ZAMIL VU Hub - Owner Restricted</title>
  <script>
    // Apply stored or system theme early so restricted page matches main site
    (function(){
      try{
        var s = localStorage.getItem('mzh_theme');
        function setClasses(kind){
          if(kind === 'light'){
            document.documentElement.classList.add('light');
            document.documentElement.classList.remove('dark');
          } else {
            document.documentElement.classList.add('dark');
            document.documentElement.classList.remove('light');
          }
        }
        if(s === 'light') setClasses('light');
        else if(s === 'dark') setClasses('dark');
        else if(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) setClasses('dark');
        else setClasses('light');
      }catch(e){}
    })();
  </script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --panel: #0f172a;
      --border: #1e293b;
      --text: #e2e8f0;
      --muted: #cbd5e1; /* slightly brighter muted tone for better legibility */
      --accent: #1d4ed8;
      --accent-2: #f59e0b;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(29, 78, 216, 0.20), transparent 26%),
        radial-gradient(circle at top right, rgba(245, 158, 11, 0.16), transparent 24%),
        linear-gradient(180deg, #081122 0%, #020617 62%);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      user-select: none;
    }
    .card {
      width: min(560px, 100%);
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(2, 6, 23, 0.98));
      border: 1px solid rgba(96, 165, 250, 0.16);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 24px 70px rgba(0,0,0,.42);
      text-align: center;
      backdrop-filter: blur(18px);
    }
    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(29, 78, 216, .9), rgba(245, 158, 11, .9));
      border: 1px solid rgba(255, 255, 255, .15);
      color: #ffffff;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: 12px;
    }
    h1 {
      margin: 18px 0 10px;
      font-family: Georgia, 'Times New Roman', serif;
      letter-spacing: 0.02em;
      font-size: clamp(30px, 4vw, 44px);
    }
    p { margin: 0; color: var(--muted); line-height: 1.7; }
    .footer { margin-top: 18px; font-size: 12px; color: #94a3b8; letter-spacing: .12em; text-transform: uppercase; }
    .actions { margin-top: 22px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #0f172a; box-shadow: 0 12px 24px rgba(29, 78, 216, .22); }
    .btn-secondary { background: transparent; color: var(--text); border: 1px solid rgba(148, 163, 184, .28); }
    .lock {
      width: 72px; height: 72px; border-radius: 22px;
      margin: 0 auto 8px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, rgba(29, 78, 216, .18), rgba(245, 158, 11, .18));
      border: 1px solid rgba(255, 255, 255, .12);
      font-size: 32px;
    }
    .brandline {
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: #93c5fd;
      font-weight: 800;
    }
    .subtle {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="card" aria-label="Owner restricted page">
    <div class="lock">🔒</div>
    <div class="badge">MUHIUM & ZAMIL</div>
    <h1>Access Locked</h1>
    <div class="brandline">MUHIUM & ZAMIL VU Hub</div>
    <div class="subtle">Premium access gate for the MUHIUM & ZAMIL branded experience</div>
    <p>
      This area is restricted by MUHIUM & ZAMIL.
      If you believe this is a mistake, contact the owner for access.
    </p>
    <div class="actions">
      <button class="btn btn-primary" onclick="location.href='index.html'">Return</button>
      <button class="btn btn-secondary" onclick="location.reload()">Reload</button>
    </div>
    <div class="footer">MUHIUM & ZAMIL VU Hub protected screen</div>
  </main>
  <script>
    document.addEventListener('contextmenu', function (e) { e.preventDefault(); }, true);
    document.addEventListener('keydown', function (e) { e.preventDefault(); }, true);
  </script>
</body>
</html>
